name: Build

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
  workflow_call:

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --check

  clippy:
    name: Clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        targets:
          [
            {
              name: windows64,
              fancy_name: windows,
              runner: windows-latest,
              target: x86_64-pc-windows-msvc,
              ffmpeg_filename: ffmpeg-6.0-essentials_build.7z,
              ffprobe_filename: "",
            },
            {
              name: macos-intel,
              fancy_name: macos-intel,
              runner: macos-latest,
              target: x86_64-apple-darwin,
              ffmpeg_filename: ffmpeg6intel.zip,
              ffprobe_filename: ffprobe6intel.zip,
            },
            {
              name: macos-arm,
              fancy_name: macos-apple-silicon,
              runner: macos-latest,
              target: aarch64-apple-darwin,
              ffmpeg_filename: ffmpeg6arm.zip,
              ffprobe_filename: ffprobe6arm.zip,
            },
            {
              name: linux64,
              fancy_name: linux64,
              runner: ubuntu-latest,
              target: x86_64-unknown-linux-gnu,
              ffmpeg_filename: ffmpeg-linux-x64.zip,
              ffprobe_filename: "",
            }
          ]
    runs-on: ${{ matrix.targets.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.targets.target }}

      - name: Cache dependencies
        id: extcache
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ${{ github.workspace }}/ext/
          prefix-key: "v1"

      - name: Install cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Install cargo-wix
        if: ${{ matrix.targets.name == 'windows64' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo binstall cargo-wix --no-confirm --force

      - name: Install cargo-bundle
        if: ${{ matrix.targets.name == 'macos-intel' || matrix.targets.name == 'macos-arm'}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo binstall cargo-bundle --no-confirm --force

      - name: Install appimagetool
        if: ${{ matrix.targets.name == 'linux64'}}

        run: |
          sudo apt-get update
          sudo apt-get install libfuse-dev
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-$(uname -m).AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build (Windows)
        if: ${{ matrix.targets.name == 'windows64'}}
        run: cargo build --release --package walksnail-osd-tool --features windows-installer

      - name: Build (MacOS)
        if: ${{ matrix.targets.name == 'macos-intel' || matrix.targets.name == 'macos-arm'}}
        run: cargo build --release --package walksnail-osd-tool --target ${{ matrix.targets.target }} --features macos-app-bundle

      - name: Build (Linux)
        if: ${{ matrix.targets.name == 'linux64'}}
        run: cargo build --release --package walksnail-osd-tool --target ${{ matrix.targets.target }}

      - name: Extract ffmpeg
        run: |
          cd ${{ github.workspace }}/ext/ffmpeg/${{ matrix.targets.name }}
          7z x ${{ matrix.targets.ffmpeg_filename }} -aoa

      - name: Extract ffprobe
        if: ${{ matrix.targets.name == 'macos-intel' || matrix.targets.name == 'macos-arm' || matrix.targets.name == 'linux64' }}
        run: |
          cd ${{ github.workspace }}/ext/ffmpeg/${{ matrix.targets.name }}
          7z x ${{ matrix.targets.ffprobe_filename }} -aoa

      - name: Create Windows installer
        if: ${{ matrix.targets.name == 'windows64'}}
        run: |
          cargo wix --package walksnail-osd-tool --include _deploy/windows/wix/main.wxs --nocapture --no-build
          cd target/wix/
          7z a temp.zip *.msi
          mkdir -p ../../_deploy
          mv temp.zip ../../_deploy/walksnail-osd-tool-${{ matrix.targets.fancy_name }}.zip
        shell: bash

      - name: Create Mac App bundle
        if: ${{ matrix.targets.name == 'macos-intel' || matrix.targets.name == 'macos-arm'}}
        run: |
          cargo bundle --release --package walksnail-osd-tool --target ${{ matrix.targets.target }} --features macos-app-bundle
          cp ${{ github.workspace }}/ext/ffmpeg/${{ matrix.targets.name }}/ffmpeg ${{ github.workspace }}/target/${{ matrix.targets.target }}/release/bundle/osx/Walksnail\ OSD\ Tool.app/Contents/MacOS/ffmpeg
          cp ${{ github.workspace }}/ext/ffmpeg/${{ matrix.targets.name }}/ffprobe ${{ github.workspace }}/target/${{ matrix.targets.target }}/release/bundle/osx/Walksnail\ OSD\ Tool.app/Contents/MacOS/ffprobe
          cd ${{ github.workspace }}/target/${{ matrix.targets.target }}/release/bundle/osx/

          codesign --force -s - Walksnail\ OSD\ Tool.app/Contents/MacOS/ffmpeg
          codesign --force -s - Walksnail\ OSD\ Tool.app/Contents/MacOS/ffprobe
          codesign --force -s - Walksnail\ OSD\ Tool.app/Contents/MacOS/walksnail-osd-tool
          codesign --force -s - Walksnail\ OSD\ Tool.app

          zip -r temp.zip Walksnail\ OSD\ Tool.app
          mv temp.zip ${{ github.workspace }}/_deploy/walksnail-osd-tool-${{ matrix.targets.fancy_name }}.zip

      - name: Create Linux AppImage
        if: ${{ matrix.targets.name == 'linux64'}}
        run: |
          mkdir -p walksnail-osd-tool/usr/bin
          cp ${{ github.workspace }}/target/${{ matrix.targets.target }}/release/walksnail-osd-tool walksnail-osd-tool/usr/bin/walksnail-osd-tool
          cp ${{ github.workspace }}/ext/ffmpeg/${{ matrix.targets.name }}/ffmpeg walksnail-osd-tool/usr/bin/
          cp ${{ github.workspace }}/ext/ffmpeg/${{ matrix.targets.name }}/ffprobe walksnail-osd-tool/usr/bin/
          cp ${{ github.workspace }}/resources/icons/512x512.png walksnail-osd-tool/walksnail-osd-tool.png
          cp ${{ github.workspace }}/resources/icons/512x512.png walksnail-osd-tool/.DirIcon

          cat > walksnail-osd-tool/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/walksnail-osd-tool" "$@"
          EOF
          chmod +x walksnail-osd-tool/AppRun

          cp ${{ github.workspace }}/resources/walksnail-osd-tool.desktop walksnail-osd-tool/walksnail-osd-tool.desktop

          cd walksnail-osd-tool
          ARCH=x86_64 appimagetool .

      - name: Save Linux artifact
        if: ${{ matrix.targets.name == 'linux64'}}
        uses: actions/upload-artifact@v7
        with:
          name: walksnail-osd-tool-${{ matrix.targets.name }}
          path: ${{ github.workspace }}/walksnail-osd-tool/*.AppImage

      - name: Save binaries
        if: ${{ matrix.targets.name != 'linux64'}}
        uses: actions/upload-artifact@v7
        with:
          name: walksnail-osd-tool-${{ matrix.targets.name }}
          path: ${{ github.workspace }}/_deploy/*.*